/* ─── HOOKS ─── */
function useInView(t=0.12){
  const ref=useRef(null);
  const [v,setV]=useState(false);
  useEffect(()=>{
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect();}},{threshold:t});
    if(ref.current)o.observe(ref.current);
    return()=>o.disconnect();
  },[t]);
  return[ref,v];
}
function useCount(target,run,dur=1800){
  const [n,setN]=useState(0);
  useEffect(()=>{
    if(!run)return;
    let s=0;const step=target/(dur/16);
    const id=setInterval(()=>{s+=step;if(s>=target){setN(target);clearInterval(id);}else setN(Math.floor(s));},16);
    return()=>clearInterval(id);
  },[run,target,dur]);
  return n;
}

/* ─── TOAST ─── */
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t);},[onDone]);
  return(
    <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:"linear-gradient(135deg,#FF6B00,#FF3D00)",color:"#fff",padding:"13px 28px",borderRadius:50,fontFamily:"'Tajawal',sans-serif",fontSize:15,fontWeight:800,boxShadow:"0 8px 32px rgba(255,107,0,.5)",animation:"fadeUp .3s ease",whiteSpace:"nowrap"}}>
      {msg}
    </div>
  );
}

/* ─── CART ─── */
function Cart({cart,setCart,lang,close}){
  const ar=lang==="ar";
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  function rm(id){setCart(c=>c.filter(i=>i.id!==id));}
  function qty(id,d){setCart(c=>c.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));}
  function send(){
    if(!cart.length)return;
    const hdr=ar?"🔥 طلب جديد — نار وبهار 🔥\n\n":"🔥 New Order — Nar & Bahar 🔥\n\n";
    const body=cart.map(i=>`• ${ar?i.ar:i.en} × ${i.qty}  →  ${fp(i.price*i.qty)}`).join("\n");
    const tot=`\n\n💰 ${ar?"المجموع":"Total"}: ${fp(total)}`;
    window.open(`https://wa.me/${WA}?text=${encodeURIComponent(hdr+body+tot)}`,"_blank");
  }
  return(
    <div onClick={close} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,.75)",backdropFilter:"blur(8px)",display:"flex",justifyContent:ar?"flex-start":"flex-end"}}>
      <div onClick={e=>e.stopPropagation()} style={{width:Math.min(420,window.innerWidth),background:"#0D0D0D",borderLeft:ar?"none":"1px solid #222",borderRight:ar?"1px solid #222":"none",height:"100%",display:"flex",flexDirection:"column",padding:24,animation:ar?"slideLeft .35s cubic-bezier(.16,1,.3,1)":"slideRight .35s cubic-bezier(.16,1,.3,1)",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <h2 style={{color:"#FF6B00",fontSize:22,fontWeight:800,margin:0}}>{ar?"🛒 سلة الطلبات":"🛒 Your Order"}</h2>
          <button onClick={close} style={{background:"none",border:"none",color:"#666",fontSize:26,cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        {cart.length===0?(
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#444",gap:16}}>
            <span style={{fontSize:64}}>🍽️</span>
            <p style={{fontSize:16}}>{ar?"السلة فارغة":"Cart is empty"}</p>
          </div>
        ):(
          <>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
              {cart.map(item=>(
                <div key={item.id} style={{background:"#1a1a1a",borderRadius:14,padding:14,border:"1px solid #2a2a2a",display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <p style={{color:"#fff",fontSize:15,fontWeight:700,margin:"0 0 4px"}}>{ar?item.ar:item.en}</p>
                    <p style={{color:"#FF6B00",fontSize:14,margin:0}}>{fp(item.price*item.qty)}</p>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>qty(item.id,-1)} style={{width:28,height:28,borderRadius:"50%",background:"#2a2a2a",border:"none",color:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    <span style={{color:"#fff",fontWeight:800,minWidth:20,textAlign:"center"}}>{item.qty}</span>
                    <button onClick={()=>qty(item.id,1)} style={{width:28,height:28,borderRadius:"50%",background:"#FF6B00",border:"none",color:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                  <button onClick={()=>rm(item.id)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",opacity:.6}}>🗑️</button>
                </div>
              ))}
            </div>
            <div style={{marginTop:20,paddingTop:20,borderTop:"1px solid #222"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
                <span style={{color:"#aaa",fontSize:16}}>{ar?"المجموع:":"Total:"}</span>
                <span style={{color:"#FF6B00",fontSize:22,fontWeight:900}}>{fp(total)}</span>
              </div>
              <button onClick={send} className="btn-primary" style={{width:"100%",padding:16,fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",gap:10,background:"linear-gradient(135deg,#25D366,#128C7E)",boxShadow:"0 4px 20px rgba(37,211,102,.4)"}}>
                <span style={{fontSize:22}}>💬</span>
                {ar?"إرسال عبر واتساب":"Send via WhatsApp"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

            {[{k:"name",l:ar?"الاسم الكامل *":"Full Name *",p:ar?"اسمك الكريم":"Your name",t:"text"},
              {k:"phone",l:ar?"رقم الهاتف *":"Phone Number *",p:"09XXXXXXXX",t:"tel"},

              {k:"time",l:ar?"الوقت":"Time",p:"",t:"time"}].map(field=>(
              <div key={field.k}>

                <input type={field.t} value={f[field.k]} onChange={e=>setF(p=>({...p,[field.k]:e.target.value}))} placeholder={field.p} style={inp}/>

              <select value={f.guests} onChange={e=>setF(p=>({...p,guests:e.target.value}))} style={inp}>

/* ════════════════════════════════════════
   APP ROOT
════════════════════════════════════════ */
function App(){
  const [lang,setLang]=useState("ar");
  const [page,setPage]=useState("home");
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const ar=lang==="ar";

  useEffect(()=>{
    document.documentElement.dir=ar?"rtl":"ltr";
    document.documentElement.lang=ar?"ar":"en";
  },[ar]);

  useEffect(()=>{window.scrollTo({top:0,behavior:"smooth"});},[page]);

  const addCart=useCallback((dish)=>{
    setCart(c=>{
      const ex=c.find(i=>i.id===dish.id);
      return ex?c.map(i=>i.id===dish.id?{...i,qty:i.qty+1}:i):[...c,{...dish,qty:1}];
    });
    setToast(ar?`✅ تمت إضافة ${dish.ar}`:`✅ Added ${dish.en}`);
  },[ar]);

  const cartN=cart.reduce((s,i)=>s+i.qty,0);

  const PAGES={
    home:<HomePage lang={lang} setPage={setPage} addCart={addCart}/>,
    menu:<MenuPage lang={lang} addCart={addCart}/>,
    about:<AboutPage lang={lang}/>,
    gallery:<GalleryPage lang={lang}/>,
    reservations:<ReservationsPage lang={lang}/>,
    contact:<ContactPage lang={lang}/>,
    faq:<FAQPage lang={lang}/>,
  };

  return(
    <div style={{minHeight:"100vh",background:"#080808",color:"#fff"}}>
      <Navbar lang={lang} setLang={setLang} page={page} setPage={setPage} cartN={cartN} openCart={()=>setCartOpen(true)}/>
      <main>{PAGES[page]||<NotFound lang={lang} setPage={setPage}/>}</main>
      {page!=="home"&&<ResCTA lang={lang} setPage={setPage}/>}
      <Footer lang={lang} setPage={setPage}/>

      {cartOpen&&<Cart cart={cart} setCart={setCart} lang={lang} close={()=>setCartOpen(false)}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}

      {/* Floating WhatsApp */}
      <a href={`https://wa.me/${WA}`} target="_blank" rel="noreferrer"
        style={{position:"fixed",bottom:24,left:ar?24:"auto",right:ar?"auto":24,zIndex:400,width:58,height:58,borderRadius:"50%",background:"linear-gradient(135deg,#25D366,#128C7E)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,textDecoration:"none",boxShadow:"0 4px 20px rgba(37,211,102,.5)",animation:"pulse 2.5s ease-in-out infinite"}}>
        💬
      </a>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
